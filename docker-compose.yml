services:
  animaworks:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "18500:18500"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TZ: Asia/Tokyo
    volumes:
      - animaworks-data:/root/.animaworks
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18500/api/system/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  animaworks-data:
